{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: auto; background: white; color: black; padding: 30px; border-radius: 8px;">
    <h2 style="text-align: center; color: #d35400;">Login</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="width: 100%; padding: 10px; background: #d35400; color: white; border: none; border-radius: 4px; font-weight: bold;">Login</button>
    </form>
    <p style="text-align: center; margin-top: 15px;">New User? <a href="/register/">Register Here</a></p>
</div>
{% endblock %}
