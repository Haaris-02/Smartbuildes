{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: auto; background: white; color: black; padding: 30px; border-radius: 8px;">
    <h2 style="text-align: center; color: #2980b9;">Register</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="width: 100%; padding: 10px; background: #2980b9; color: white; border: none; border-radius: 4px; font-weight: bold;">Register</button>
    </form>
</div>
{% endblock %}
